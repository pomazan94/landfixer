# ============================================
# LandFixer - bot.lead-collector.pro
# ============================================
# Этот файл — include-сниппет для панели хостинга (ISPmanager).
# Копировать в: /etc/nginx/vhosts-resources/bot.lead-collector.pro/proxy.conf
# Панель сама создает server{} блоки, мы добавляем только location'ы.
#
# После копирования:
#   nginx -t && nginx -s reload
# ============================================

client_max_body_size 50m;

# ─── Grafana на /grafana/ ───────────────────
location /grafana/ {
    proxy_pass http://127.0.0.1:3000/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_buffering    off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# ─── Admin UI на /admin/ ───────────────────
location /admin/ {
    proxy_pass http://127.0.0.1:8585/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering    off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# ─── n8n — всё остальное (UI + webhooks) ────
location / {
    proxy_pass         http://127.0.0.1:5678;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_buffering    off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
