# ============================================
# Nginx reverse proxy - LandFixer full stack
# Всё на одном домене: bot.lead-collector.pro
# ============================================
# Скопируй этот файл в /etc/nginx/sites-available/
# и создай симлинк: ln -s /etc/nginx/sites-available/landfixer.conf /etc/nginx/sites-enabled/
#
# SSL:
#   sudo certbot --nginx -d bot.lead-collector.pro

server {
    listen 80;
    server_name bot.lead-collector.pro;

    # ─── Grafana на /grafana/ ───────────────────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Grafana API/static assets (нужно для корректной работы)
    location /grafana/api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── n8n — всё остальное (/, /webhook/, UI) ──
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        # WebSocket support (нужен для n8n UI)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличенные таймауты для долгих workflow
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Большие тела запросов (для загрузки изображений)
        client_max_body_size 50m;
    }
}
