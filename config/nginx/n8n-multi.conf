# bot.lead-collector.pro — include-сниппет для ISPmanager
# Копировать в: /etc/nginx/vhosts-resources/bot.lead-collector.pro/proxy.conf
# После: nginx -t && nginx -s reload

client_max_body_size 50m;

# Admin UI — статический index.html
location /admin/ {
    alias /home/user/landfixer/admin-ui/templates/;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
}

# n8n (UI + webhooks включая /webhook/admin-api)
location / {
    proxy_pass         http://127.0.0.1:5678;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_buffering    off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
