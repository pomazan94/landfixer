# ============================================
# Nginx reverse proxy - LandFixer full stack
# ============================================
# Скопируй этот файл в /etc/nginx/sites-available/
# и создай симлинк: ln -s /etc/nginx/sites-available/n8n-multi.conf /etc/nginx/sites-enabled/
#
# Для SSL используй certbot:
#   sudo certbot --nginx -d n8n.bot.lead-collector.pro -d n8n-2.bot.lead-collector.pro -d grafana.bot.lead-collector.pro

# ─── Инстанс 1: Основной n8n (порт 5678) ────────
server {
    listen 80;
    server_name n8n.bot.lead-collector.pro;    # ← замени на свой поддомен

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        # WebSocket support (нужен для n8n UI)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличенные таймауты для долгих workflow
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Большие тела запросов (для загрузки изображений)
        client_max_body_size 50m;
    }
}

# ─── Инстанс 2: Второй проект (порт 5679) ───
server {
    listen 80;
    server_name n8n-2.bot.lead-collector.pro;  # ← замени на свой поддомен

    location / {
        proxy_pass http://127.0.0.1:5679;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }
}

# ─── Grafana Dashboard (порт 3000) ───────────
server {
    listen 80;
    server_name grafana.bot.lead-collector.pro;  # ← замени на свой поддомен

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (нужен для Grafana Live)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

