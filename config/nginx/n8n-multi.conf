# bot.lead-collector.pro — include-сниппет для ISPmanager
# Копировать в: /etc/nginx/vhosts-resources/bot.lead-collector.pro/proxy.conf
# После: nginx -t && nginx -s reload

client_max_body_size 50m;

# Главная — Admin UI (index.html лежит в $root_path)
location = / {
    try_files /index.html =404;
}

# n8n webhooks (API для UI)
location /webhook/ {
    proxy_pass         http://127.0.0.1:5678;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# n8n UI (рабочий интерфейс n8n)
location / {
    proxy_pass         http://127.0.0.1:5678;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_buffering    off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
