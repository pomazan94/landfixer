# ============================================
# LandFixer - bot.lead-collector.pro
# ============================================
# IP: 89.23.107.232
# SSL: Let's Encrypt через панель хостинга

# -----------------------
# HTTP -> HTTPS redirect
# -----------------------
server {
    listen 89.23.107.232:80;
    server_name bot.lead-collector.pro www.bot.lead-collector.pro;
    return 301 https://$host$request_uri;
}

# -----------------------
# HTTPS reverse proxy
# -----------------------
server {
    listen 89.23.107.232:443 ssl;
    server_name bot.lead-collector.pro www.bot.lead-collector.pro;

    ssl_certificate "/var/www/httpd-cert/pomazan/bot.lead-collector.pro_le1.crt";
    ssl_certificate_key "/var/www/httpd-cert/pomazan/bot.lead-collector.pro_le1.key";
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50m;

    # ─── Grafana на /grafana/ ───────────────────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_buffering    off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── n8n — всё остальное (UI + webhooks) ────
    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_buffering    off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
